{{- if (index .Values "synology-csi" "enabled") }}
---
kind: SecurityContextConstraints
apiVersion: security.openshift.io/v1
metadata:
  name: synology-csi-scc
allowPrivilegedContainer: true
allowHostDirVolumePlugin: true
fsGroup:
  type: RunAsAny
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
users:
- system:serviceaccount:synology-csi:synology-csi-controller
- system:serviceaccount:synology-csi:synology-csi-snapshotter
{{- end }}